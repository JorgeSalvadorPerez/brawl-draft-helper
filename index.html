<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Best Brawl Stars draft helper">
<title>Brawl Draft Helper</title>
    <link rel="stylesheet" href="CSS-BrawlPicks.css">
    <link rel="icon" type="image/png" href="icons8-estrellas-de-la-pelea-64.png">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KVH5078PG0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KVH5078PG0');
</script>
</head>
<body>
    <main class="draft-layout">
        <aside class="brawler-panel">
            <div class="panel-header">
                <h1 data-i18n="title">Brawl Draft Helper</h1>
            </div>

            <div class="panel-controls">
                <label for="search-input" data-i18n="label.search">Search</label>
                <input id="search-input" type="search" data-i18n-placeholder="placeholder.search" placeholder="Search brawler">

                <label for="sort-select" data-i18n="label.sort">Sort by</label>
                <select id="sort-select">
                    <option value="alphabetical" data-i18n="option.alphabetical">Alphabetical</option>
                    <option value="rarity" data-i18n="option.rarity">Rarity</option>
                </select>

                <label for="direction-select" data-i18n="label.direction">Direction</label>
                <select id="direction-select">
                    <option value="asc" data-i18n="option.asc">Ascending</option>
                    <option value="desc" data-i18n="option.desc">Descending</option>
                </select>
            </div>

            <div class="brawler-list">
                <div class="brawler-grid"></div>
            </div>
        </aside>

        <section class="draft-board">
            <div class="draft-center">
                <div class="pick-container">
                    <div class="pick-slot" data-placeholder="PICK 1" data-i18n-placeholder="placeholder.pick1">PICK 1</div>
                    <div class="pick-slot" data-placeholder="PICK 2" data-i18n-placeholder="placeholder.pick2">PICK 2</div>
                    <div class="pick-slot" data-placeholder="PICK 3" data-i18n-placeholder="placeholder.pick3">PICK 3</div>
                </div>
                <div class="ban-container">
                    <div class="ban-slot" data-placeholder="BAN 1" data-i18n-placeholder="placeholder.ban1">BAN 1</div>
                    <div class="ban-slot" data-placeholder="BAN 2" data-i18n-placeholder="placeholder.ban2">BAN 2</div>
                    <div class="ban-slot" data-placeholder="BAN 3" data-i18n-placeholder="placeholder.ban3">BAN 3</div>
                </div>
                <div class="tip-panel">
                    <h3 data-i18n="tip.title">Brawler Tip</h3>
                    <div class="tip-timer">
                        <span class="tip-timer-label">Time remaining:</span>
                        <span class="tip-timer-value">8s</span>
                        <div class="tip-progress">
                            <div class="tip-progress-fill"></div>
                        </div>
                    </div>
                    <div class="tip-details">
                        <span class="tip-brawler-name">Loading...</span>
                        <p class="tip-text">Tips rotate automatically every 8 seconds.</p>
                        <span class="tip-note">Dynamic rotating tips.</span>
                    </div>
                </div>
            </div>

            <aside class="recommendation-panel">
                <h2 data-i18n="recommendations.title">Recommendations</h2>
                <p class="recommendation-empty">Drag an enemy brawler to see counters.</p>
                <div class="recommendation-list"></div>
            </aside>
        </section>
    </main>

    <script src="Brawlers.js"></script>
    <script src="JavaScript_BrawlPicks.js"></script>
</body>
</html>
